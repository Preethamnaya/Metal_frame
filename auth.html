<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Customer Authentication | Harsha Metal Frame Works</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/pages.css">
  
  <!-- Firebase Compatibility Libraries -->
  <script defer src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script defer src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script defer src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
  <script defer src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>
  
  <!-- App JS -->
  <script defer src="js/firebase-config.js"></script>
  <script defer src="js/main.js"></script>
  <script defer src="js/auth.js"></script>
</head>
<body class="metal-bg grain-overlay">

  <section class="auth-page">
    <div class="auth-card animate-fadeInUp">
      
      <div class="auth-logo">
        <div class="logo-icon">H</div>
        <h1>HARSHA METAL_FRAM_WORKS</h1>
        <p>Customer & Administration Portal</p>
      </div>

      <!-- Tabs Toggle (Login vs Register) -->
      <div class="auth-tabs" id="auth-tabs-toggle">
        <button class="auth-tab active" data-tab="login">Sign In</button>
        <button class="auth-tab" data-tab="register">Register</button>
      </div>

      <!-- Auth Error Box -->
      <div id="auth-error-msg" class="form-error" style="text-align: center; margin-bottom: 16px; display: none;"></div>

      <!-- LOGIN FORM -->
      <form id="login-form">
        <div class="form-group">
          <label for="login-email" class="form-label">Email Address</label>
          <input type="email" id="login-email" class="form-input" placeholder="Enter your email" required>
        </div>
        <div class="form-group">
          <label for="login-password" class="form-label">Password</label>
          <input type="password" id="login-password" class="form-input" placeholder="••••••••" required>
        </div>
        <button type="submit" id="login-submit-btn" class="btn btn-primary btn-full" style="margin-top: 8px;">
          <span class="btn-text">Log In</span>
        </button>
      </form>

      <!-- REGISTER FORM -->
      <form id="register-form" style="display: none;">
        <div class="form-group">
          <label for="register-name" class="form-label">Full Name</label>
          <input type="text" id="register-name" class="form-input" placeholder="Your Name" required>
        </div>
        <div class="form-group">
          <label for="register-email" class="form-label">Email Address</label>
          <input type="email" id="register-email" class="form-input" placeholder="name@example.com" required>
        </div>
        <div class="form-group">
          <label for="register-phone" class="form-label">WhatsApp Mobile Number</label>
          <input type="tel" id="register-phone" class="form-input" placeholder="7411464311" required>
        </div>
        <div class="form-group">
          <label for="register-password" class="form-label">Create Password</label>
          <input type="password" id="register-password" class="form-input" placeholder="At least 6 characters" required>
        </div>
        <button type="submit" id="register-submit-btn" class="btn btn-primary btn-full" style="margin-top: 8px;">
          <span class="btn-text">Create Account</span>
        </button>
      </form>

      <div class="auth-divider">
        <span>OR CONTINUE WITH</span>
      </div>

      <button class="google-btn" id="google-signin-btn">
        <img src="https://img.icons8.com/color/48/000000/google-logo.png" alt="Google icon">
        <span>Sign In with Google</span>
      </button>

      <!-- Secret Admin Test Quick Login -->
      <div style="margin-top: 24px; text-align: center; border-top: 1px dashed var(--border); padding-top: 16px;">
        <span style="font-size: 0.8rem; color: var(--text-muted); display: block; margin-bottom: 8px;">Testing Mode Shortcuts:</span>
        <div class="flex-center gap-sm">
          <button id="quick-customer-btn" class="btn btn-ghost btn-sm" style="font-size: 0.75rem; padding: 6px 12px;">Demo Customer</button>
          <button id="quick-admin-btn" class="btn btn-outline btn-sm" style="font-size: 0.75rem; padding: 6px 12px; color: var(--gold); border-color: var(--gold);">Demo Admin</button>
        </div>
      </div>

    </div>
  </section>

</body>
</html>
